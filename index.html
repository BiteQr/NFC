<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Success Premium Card</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif;
            background: #0f0f0f; display: flex; justify-content: center; min-height: 100vh; color: white;
        }

        .container { width: 100%; max-width: 400px; padding: 80px 20px 40px; display: none; flex-direction: column; }

        /* Glassmorphism Effect */
        .main-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 40px; padding: 40px 20px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .profile-pic { 
            width: 120px; height: 120px; border-radius: 50%; margin: -100px auto 20px;
            border: 4px solid rgba(255,255,255,0.2); overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }

        .name { font-size: 24px; font-weight: 800; margin-bottom: 30px; letter-spacing: -0.5px; }

        /* Button styles */
        .btn { 
            width: 100%; padding: 18px; margin-bottom: 14px; border-radius: 22px;
            text-decoration: none; font-size: 16px; font-weight: 700; color: white;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateY(25px); /* Hidden by default for cascade */
        }
        .btn.show { opacity: 1; transform: translateY(0); }
        .btn:active { transform: scale(0.94); }

        /* Special Effects */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        .pulse { animation: pulse-ring 2s infinite; }

        /* Auto-branding */
        .bg-whatsapp { background: #25D366 !important; }
        .bg-instagram { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888) !important; }
        
        .views-count { font-size: 11px; opacity: 0.3; margin-top: 25px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="main-card">
            <div class="profile-pic"><img id="ui-photo" src=""></div>
            <div id="ui-name" class="name"></div>
            <div id="btns-box"></div>
            <div id="ui-views" class="views-count"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-43v8W_1uLTDdghlR6FSnF0a46UypK_Rq9mcisBISqZuHd1o49s8eAeYaHQQIkP0/exec";

        window.onload = async () => {
            const userId = new URLSearchParams(window.location.search).get('id');
            if (!userId) return;

            try {
                const res = await fetch(`${API_URL}?id=${userId}`);
                const data = await res.json();
                
                document.getElementById('ui-photo').src = data.photo_url || '';
                document.getElementById('ui-name').innerText = data.name || '';
                document.getElementById('ui-views').innerText = `ACTIVITY: ${data.views || 0}`;

                const box = document.getElementById('btns-box');
                const defColor = data.btn_color || 'rgba(255,255,255,0.1)';

                function drawBtn(text, link) {
                    if(!text || !link) return;
                    let p = text.split('|').map(s => s.trim());
                    let label = p[0], icon = p[1] || 'link', col = p[2] || defColor, isPulse = p[3] === 'pulse';

                    const a = document.createElement('a');
                    a.href = link; a.className = 'btn';
                    if(isPulse) a.classList.add('pulse');

                    const low = label.toLowerCase();
                    if(low.includes('whatsapp')) { a.classList.add('bg-whatsapp'); icon='message-circle'; }
                    else if(low.includes('instagram')) { a.classList.add('bg-instagram'); icon='instagram'; }
                    
                    if(!a.className.includes('bg-')) a.style.backgroundColor = col;
                    a.innerHTML = `<i data-lucide="${icon}"></i> ${label}`;
                    box.appendChild(a);
                }

                // WhatsApp и системные кнопки
                if(data.phone) drawBtn("WhatsApp", `https://wa.me/${data.phone.toString().replace(/\D/g,"")}`);
                
                // Динамические кнопки из твоего обновленного скрипта
                Object.keys(data).filter(k => k.startsWith('extra_btn_text')).forEach(k => {
                    let id = k.split('_').pop();
                    drawBtn(data[k], data[`extra_btn_link_${id}`]);
                });

                lucide.createIcons();
                document.getElementById('app').style.display = 'flex';

                // Каскадный запуск анимации
                document.querySelectorAll('.btn').forEach((b, i) => {
                    setTimeout(() => b.classList.add('show'), i * 120);
                });

            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
