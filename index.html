<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Digital Business Card</title>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff; 
            display: flex; justify-content: center; min-height: 100vh;
            color: #000; -webkit-font-smoothing: antialiased;
        }

        .container { 
            width: 100%; max-width: 400px; padding: 40px 25px; 
            display: none; /* Скрыто до загрузки, как в твоем коде */
            flex-direction: column; align-items: center; 
        }

        /* Лоадер загрузки из твоего кода */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #333;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-top: 40vh;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Apple-стиль фото */
        .profile-pic { 
            width: 140px; height: 140px; 
            background-color: #f2f2f7; border-radius: 50%; 
            margin-bottom: 25px; overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }

        .name { 
            font-size: 32px; font-weight: 700; letter-spacing: -0.5px;
            margin-bottom: 40px; text-align: center;
        }

        /* Универсальный стиль кнопки Apple */
        .btn { 
            width: 100%; padding: 18px; margin-bottom: 12px; 
            border-radius: 16px; background-color: #eee; 
            text-decoration: none; font-size: 17px; font-weight: 600;
            text-align: center; border: none; display: block; cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }

        /* Сетка соцсетей */
        .social-grid { 
            display: flex; gap: 12px; width: 100%; margin: 30px 0 10px;
        }
        .social-btn { 
            flex: 1; border-radius: 20px; padding: 20px 10px;
            text-decoration: none; font-size: 14px; font-weight: 600; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: transform 0.1s;
        }
        .social-btn:active { transform: scale(0.97); }
        .social-btn svg { width: 28px; height: 28px; fill: currentColor; }

        /* Модальное окно QR */
        .qr-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 100;
        }
        .qr-content {
            background: white; padding: 30px; border-radius: 25px; text-align: center; width: 80%; max-width: 300px;
        }
        .qr-content img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .qr-close { background: #333; color: white; margin-bottom: 0; }
    </style>
</head>
<body>
    <div id="loader" class="loader"></div>

    <div id="app" class="container">
        <div class="profile-pic"><img id="ui-photo" src="" alt=""></div>
        <div id="ui-name" class="name"></div>
        
        <button id="btn-save" class="btn">Сохранить контакт</button>

        <div class="social-grid">
            <a id="ui-wa" href="#" class="social-btn">
                <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                WhatsApp
            </a>
            <a id="ui-tg" href="#" class="social-btn">
                <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                Telegram
            </a>
        </div>

        <div id="extra-btns" style="width: 100%;"></div>

        <button id="btn-qr" class="btn" style="background-color: transparent; border: 2px solid #ddd; margin-top: 20px; color: #000;">Поделиться QR-кодом</button>
    </div>

    <div id="qrModal" class="qr-modal">
        <div class="qr-content">
            <h3 style="margin-top: 0;">Отсканируй меня</h3>
            <img id="qr-image" src="" alt="QR Code">
            <button class="btn qr-close" onclick="document.getElementById('qrModal').style.display='none'">Закрыть</button>
        </div>
    </div>

    <script>
        // ВСТАВЬ СЮДА СВОЮ РАБОЧУЮ ССЫЛКУ ИЗ GOOGLE SCRIPT!
        const API_URL = "https://script.google.com/macros/s/AKfycbxSpvdvDwLswLzEihnxNAaE6lY_PpyjNETdSl1cgtC8Hs-orqbYDWsGUXAwGs_1qKu2/exec";
        
        let userData = null;

        // ФУНКЦИЯ УМНОГО ЦВЕТА (Черный или Белый)
        function getContrastColor(hex) {
            if (!hex || hex.indexOf('#') !== 0) return '#000000';
            const r = parseInt(hex.substr(1, 2), 16);
            const g = parseInt(hex.substr(3, 2), 16);
            const b = parseInt(hex.substr(5, 2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 155 ? '#000000' : '#ffffff';
        }

        async function initCard() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');

            if (!userId) {
                showError("Ошибка: ID не указан!");
                return;
            }

            try {
                // Тот самый надежный Fetch из твоего кода
                const response = await fetch(`${API_URL}?id=${userId}`);
                userData = await response.json();

                if (userData.error) {
                    showError(userData.error);
                } else {
                    renderData(userData);
                }
            } catch (err) {
                showError("Ошибка загрузки данных.");
                console.error(err);
            }
        }

        function showError(msg) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('ui-name').innerText = msg;
            document.getElementById('btn-save').style.display = 'none';
            document.querySelector('.social-grid').style.display = 'none';
            document.getElementById('btn-qr').style.display = 'none';
        }

        function renderData(data) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'flex'; // Показываем карточку
            
            // Основные данные
            document.getElementById('ui-photo').src = data.photo_url || 'https://via.placeholder.com/150';
            document.getElementById('ui-name').innerText = data.name || '';

            // Работа с Умным Цветом
            const mainColor = data.btn_color || '#f2f2f7';
            const textColor = getContrastColor(mainColor);

            // Применяем цвета к главным кнопкам
            const btnSave = document.getElementById('btn-save');
            btnSave.style.backgroundColor = mainColor;
            btnSave.style.color = textColor;

            const btnWa = document.getElementById('ui-wa');
            const btnTg = document.getElementById('ui-tg');
            btnWa.style.backgroundColor = mainColor; btnWa.style.color = textColor;
            btnTg.style.backgroundColor = mainColor; btnTg.style.color = textColor;

            // Мессенджеры
            if(data.whatsapp) {
                btnWa.href = `https://wa.me/${data.whatsapp}`;
            } else {
                btnWa.style.display = 'none';
            }
            if(data.telegram) {
                btnTg.href = `https://t.me/${data.telegram}`;
            } else {
                btnTg.style.display = 'none';
            }

            // Динамичные дополнительные кнопки (до 5 штук)
            const extraContainer = document.getElementById('extra-btns');
            extraContainer.innerHTML = ''; // Очищаем контейнер
            for(let i=1; i<=5; i++) {
                if(data[`extra_btn_text_${i}`] && data[`extra_btn_link_${i}`]) {
                    const a = document.createElement('a');
                    a.className = 'btn';
                    a.href = data[`extra_btn_link_${i}`];
                    a.innerText = data[`extra_btn_text_${i}`];
                    a.style.backgroundColor = mainColor;
                    a.style.color = textColor;
                    extraContainer.appendChild(a);
                }
            }

            // Сохранение контакта
            btnSave.onclick = () => {
                const vcard = `BEGIN:VCARD\nVERSION:3.0\nN:${data.name};;;;\nFN:${data.name}\nTEL;TYPE=CELL:${data.phone || data.whatsapp}\nURL:${window.location.href}\nEND:VCARD`;
                const blob = new Blob([vcard], { type: "text/vcard" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = `${data.name}.vcf`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            };

            // QR Код
            document.getElementById('btn-qr').onclick = () => {
                const currentUrl = window.location.href;
                document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(currentUrl)}`;
                document.getElementById('qrModal').style.display = 'flex';
            };
        }

        // Твой надежный запуск
        window.onload = initCard;
    </script>
</body>
</html>
