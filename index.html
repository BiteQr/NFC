<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Success Premium Card</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --glass: rgba(255, 255, 255, 0.12); --blur: blur(25px); }
        
        body { 
            margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif;
            background: #0f0f0f; display: flex; justify-content: center; min-height: 100vh; color: white;
            overflow-x: hidden;
        }

        /* iOS FIX: Фоновая картинка через псевдоэлемент */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background 0.5s ease;
        }

        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0f0f; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; transition: opacity 0.5s ease;
        }
        .loader-content { width: 100%; max-width: 300px; text-align: center; }
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 25px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #34C759, #007AFF); transition: width 0.4s ease; }
        #quote-area { min-height: 60px; font-style: italic; opacity: 0.9; font-size: 0.95rem; line-height: 1.4; margin-bottom: 20px; }
        
        .skel-card { height: 55px; background: var(--glass); border-radius: 22px; margin-bottom: 14px; position: relative; overflow: hidden; }
        .skel-card::after { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { left: 100%; } }

        .container { 
            width: 100%; max-width: 400px; padding: 120px 20px 40px; 
            display: none; flex-direction: column; align-items: center; position: relative; 
        }

        .views-badge {
            position: absolute; top: 40px; background: rgba(0, 0, 0, 0.3);
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            padding: 8px 16px; border-radius: 20px; display: flex; align-items: center; gap: 10px;
            font-size: 11px; font-weight: 700; color: white; border: 1px solid rgba(255,255,255,0.15);
            z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.2); letter-spacing: 0.5px; text-transform: uppercase;
        }

        .online-dot { width: 8px; height: 8px; background-color: #34C759; border-radius: 50%; box-shadow: 0 0 10px #34C759; animation: dot-pulse 2s infinite; }
        @keyframes dot-pulse { 0% { transform: scale(1); opacity: 1; } 70% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        .main-card {
            width: 100%; background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(30px) brightness(0.9); -webkit-backdrop-filter: blur(30px) brightness(0.9);
            border-radius: 40px; padding: 40px 20px; border: 1px solid rgba(255,255,255,0.12);
            text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .profile-pic { width: 120px; height: 120px; border-radius: 50%; margin: -100px auto 20px; border: 4px solid rgba(255,255,255,0.2); overflow: hidden; background: #fff; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 22px; font-weight: 800; margin-bottom: 30px; letter-spacing: -0.5px; line-height: 1.2; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .btn { 
            width: 100%; padding: 18px; margin-bottom: 14px; border-radius: 22px;
            text-decoration: none; font-size: 16px; font-weight: 700; color: white;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateY(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn.show { opacity: 1; transform: translateY(0); }
        .btn:active { transform: scale(0.96); }

        .pulse { animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3); } 70% { box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }

        .bg-whatsapp { background: #25D366 !important; color: white !important; border: none !important; }
        .bg-instagram { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888) !important; color: white !important; border: none !important; }

        .footer-cta {
            margin-top: 25px; width: 100%; max-width: 280px; background: rgba(0, 0, 0, 0.3);
            padding: 12px; border-radius: 18px; text-decoration: none; font-size: 13px; font-weight: 600;
            color: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; gap: 8px;
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-content">
            <div id="quote-area">"Загружаем успех..."</div>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div class="skel-card"></div>
            <div class="skel-card"></div>
            <div style="font-size: 0.7rem; opacity: 0.3; margin-top: 20px; letter-spacing: 2px;">SUCCESS CARD PREMIUM</div>
        </div>
    </div>

    <div id="app" class="container">
        <div class="views-badge">
            <div class="online-dot"></div>
            <span>Посещений: <span id="ui-views">0</span></span>
        </div>

        <div class="main-card">
            <div class="profile-pic"><img id="ui-photo" src=""></div>
            <div id="ui-name" class="name"></div>
            <div id="btns-box"></div>
        </div>

        <a id="ui-create" href="#" class="footer-cta">
            <i data-lucide="sparkles" style="width:16px;"></i>
            <span>Создать такую же визитку</span>
        </a>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-43v8W_1uLTDdghlR6FSnF0a46UypK_Rq9mcisBISqZuHd1o49s8eAeYaHQQIkP0/exec";
        const ADMIN_WA = "77064150958";
        const quotes = [
            "Успех — это сумма малых усилий, повторяемых изо дня в день.",
            "Лучший способ предсказать будущее — создать его.",
            "Ваше время ограничено, не тратьте его, живя чужой жизнью.",
            "Делайте сегодня то, что другие не хотят — завтра будете жить так, как другие не могут.",
            "Сложнее всего начать действовать, остальное зависит только от упорства."
        ];

        function initLoader() {
            document.getElementById('quote-area').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
            let progress = 0;
            const bar = document.getElementById('progress-bar');
            const interval = setInterval(() => {
                if (progress < 85) {
                    progress += Math.random() * 10;
                    bar.style.width = progress + '%';
                }
            }, 400);
            return interval;
        }

        function renderUI(data, userId) {
            if (!data) return;

            // Используем bg_image_url из твоей таблицы
            const bodyStyle = document.body.style;
            if (data.bg_image_url && data.bg_image_url.trim().startsWith('http')) {
                document.styleSheets[0].addRule('body::before', `background-image: url('${data.bg_image_url.trim()}')`);
            } else if (data.bg_color) {
                bodyStyle.backgroundColor = data.bg_color;
                document.styleSheets[0].addRule('body::before', `background-image: none`);
            }

            if (data.text_color) {
                document.getElementById('app').style.color = data.text_color;
                document.querySelectorAll('.views-badge, .footer-cta').forEach(el => el.style.color = data.text_color);
            }
            
            document.getElementById('ui-photo').src = data.photo_url || '';
            document.getElementById('ui-name').innerText = data.name || '';
            document.getElementById('ui-views').innerText = data.views || 0;
            document.getElementById('ui-create').href = `https://wa.me/${ADMIN_WA}?text=Здравствуйте! Хочу заказать визитку как у ${userId}`;

            const box = document.getElementById('btns-box');
            box.innerHTML = ''; 
            const globalBtnColor = data.btn_color || 'rgba(255,255,255,0.15)';

            function drawBtn(text, link) {
                if(!text || !link) return;
                let p = text.split('|').map(s => s.trim());
                let label = p[0], icon = p[1] || 'link', col = p[2] || globalBtnColor, isPulse = p[3] === 'pulse';

                const a = document.createElement('a');
                a.href = link; a.className = 'btn';
                if(isPulse) a.classList.add('pulse');

                const low = label.toLowerCase();
                if(low.includes('whatsapp')) { a.classList.add('bg-whatsapp'); icon='message-circle'; }
                else if(low.includes('instagram')) { a.classList.add('bg-instagram'); icon='instagram'; }
                
                if(!a.className.includes('bg-')) {
                    a.style.backgroundColor = col;
                    if(['gold','white','#ffffff','#fff'].includes(col.toLowerCase())) a.style.color = '#000';
                }
                
                a.innerHTML = `<i data-lucide="${icon}"></i> ${label}`;
                box.appendChild(a);
            }

            if(data.phone) drawBtn("WhatsApp", `https://wa.me/${data.phone.toString().replace(/\D/g,"")}`);
            
            Object.keys(data).filter(k => k.startsWith('extra_btn_text')).sort().forEach(k => {
                let id = k.split('_').pop();
                drawBtn(data[k], data[`extra_btn_link_${id}`]);
            });

            lucide.createIcons();
            
            document.getElementById('app').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => document.getElementById('preloader').style.display = 'none', 500);
                document.querySelectorAll('.btn').forEach((b, i) => {
                    setTimeout(() => b.classList.add('show'), i * 100);
                });
            }, 200);
        }

        window.onload = async () => {
            const userId = new URLSearchParams(window.location.search).get('id');
            if (!userId) {
                document.getElementById('quote-area').innerText = "Ошибка: ID пользователя не найден";
                return;
            }

            const loaderTimer = initLoader();
            const cached = localStorage.getItem('vcard_cache_' + userId);
            if (cached) renderUI(JSON.parse(cached), userId);

            try {
                const res = await fetch(`${API_URL}?id=${userId}`);
                const data = await res.json();
                localStorage.setItem('vcard_cache_' + userId, JSON.stringify(data));
                
                document.getElementById('progress-bar').style.width = '100%';
                clearInterval(loaderTimer);
                renderUI(data, userId);
            } catch (e) { 
                console.error(e);
                if (!cached) document.getElementById('quote-area').innerText = "Ошибка сервера";
            }
        };
    </script>
</body>
</html>
