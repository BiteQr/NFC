<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Success Premium Card</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif;
            background: #0f0f0f; display: flex; justify-content: center; min-height: 100vh; color: white;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 400px; padding: 90px 20px 40px; display: none; flex-direction: column; align-items: center; position: relative; }

        /* Живой бейдж посещаемости */
        .views-badge {
            position: absolute; top: 30px; 
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 8px 16px; border-radius: 20px;
            display: flex; align-items: center; gap: 10px;
            font-size: 11px; font-weight: 700; color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            letter-spacing: 0.5px; text-transform: uppercase;
        }

        .online-dot {
            width: 8px; height: 8px; background-color: #34C759;
            border-radius: 50%;
            box-shadow: 0 0 10px #34C759;
            animation: dot-pulse 2s infinite;
        }

        @keyframes dot-pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); }
            70% { transform: scale(1.2); opacity: 0.8; box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }

        /* Основная карта */
        .main-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 40px; padding: 40px 20px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .profile-pic { 
            width: 120px; height: 120px; border-radius: 50%; margin: -100px auto 20px;
            border: 4px solid rgba(255,255,255,0.2); overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }

        .name { font-size: 24px; font-weight: 800; margin-bottom: 30px; letter-spacing: -0.5px; }

        /* Кнопки */
        .btn { 
            width: 100%; padding: 18px; margin-bottom: 14px; border-radius: 22px;
            text-decoration: none; font-size: 16px; font-weight: 700; color: white;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateY(25px);
        }
        .btn.show { opacity: 1; transform: translateY(0); }
        .btn:active { transform: scale(0.94); }

        .pulse { animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* Брендовые цвета */
        .bg-whatsapp { background: #25D366 !important; }
        .bg-instagram { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888) !important; }

        /* Кнопка в футере */
        .footer-cta {
            margin-top: 30px; width: 100%; max-width: 300px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 14px; border-radius: 20px;
            text-decoration: none; font-size: 14px; font-weight: 600;
            color: rgba(255,255,255,0.7); text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        .footer-cta:active { background: rgba(255, 255, 255, 0.15); color: #fff; }
        .footer-cta i { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="views-badge">
            <div class="online-dot"></div>
            <span>Посещений профиля: <span id="ui-views">0</span></span>
        </div>

        <div class="main-card">
            <div class="profile-pic"><img id="ui-photo" src=""></div>
            <div id="ui-name" class="name"></div>
            <div id="btns-box"></div>
        </div>

        <a id="ui-create" href="#" class="footer-cta">
            <i data-lucide="sparkles"></i>
            <span>Создать такую же визитку</span>
        </a>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-43v8W_1uLTDdghlR6FSnF0a46UypK_Rq9mcisBISqZuHd1o49s8eAeYaHQQIkP0/exec";
        const ADMIN_WA = "77064150958";

        window.onload = async () => {
            const userId = new URLSearchParams(window.location.search).get('id');
            if (!userId) return;

            // Настройка ссылки для создания
            document.getElementById('ui-create').href = `https://wa.me/${ADMIN_WA}?text=${encodeURIComponent("Привет! Хочу заказать себе такую же цифровую визитку.")}`;

            try {
                const res = await fetch(`${API_URL}?id=${userId}`);
                const data = await res.json();
                
                document.getElementById('ui-photo').src = data.photo_url || '';
                document.getElementById('ui-name').innerText = data.name || '';
                document.getElementById('ui-views').innerText = data.views || 0;

                const box = document.getElementById('btns-box');
                const defColor = data.btn_color || 'rgba(255,255,255,0.15)';

                function drawBtn(text, link) {
                    if(!text || !link) return;
                    let p = text.split('|').map(s => s.trim());
                    let label = p[0], icon = p[1] || 'link', col = p[2] || defColor, isPulse = p[3] === 'pulse';

                    const a = document.createElement('a');
                    a.href = link; a.className = 'btn';
                    if(isPulse) a.classList.add('pulse');

                    const low = label.toLowerCase();
                    if(low.includes('whatsapp')) { a.classList.add('bg-whatsapp'); icon='message-circle'; }
                    else if(low.includes('instagram')) { a.classList.add('bg-instagram'); icon='instagram'; }
                    
                    if(!a.className.includes('bg-')) a.style.backgroundColor = col;
                    a.innerHTML = `<i data-lucide="${icon}"></i> ${label}`;
                    box.appendChild(a);
                }

                if(data.phone) drawBtn("WhatsApp", `https://wa.me/${data.phone.toString().replace(/\D/g,"")}`);
                
                Object.keys(data).filter(k => k.startsWith('extra_btn_text')).forEach(k => {
                    let id = k.split('_').pop();
                    drawBtn(data[k], data[`extra_btn_link_${id}`]);
                });

                lucide.createIcons();
                document.getElementById('app').style.display = 'flex';

                document.querySelectorAll('.btn').forEach((b, i) => {
                    setTimeout(() => b.classList.add('show'), i * 120);
                });

            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
